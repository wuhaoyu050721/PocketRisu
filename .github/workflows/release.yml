name: Create GitHub Release with Portable Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          path: |
            dist/
            server/
            package.json
            pnpm-lock.yaml
            update.sh
          retention-days: 1

  portable:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: macos
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: app-build
          path: portable/

      - name: Install production dependencies
        shell: bash
        run: |
          cd portable
          echo "node-linker=hoisted" > .npmrc
          pnpm install --prod --frozen-lockfile

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -e "console.log(require('./portable/package.json').version)")" >> $GITHUB_OUTPUT
          fi

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          NODE_VERSION="24.14.1"
          mkdir -p portable/bin
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" -o node.zip
          unzip -q node.zip
          cp "node-v${NODE_VERSION}-win-x64/node.exe" portable/bin/node.exe

      - name: Download Node.js binary (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          NODE_VERSION="24.14.1"
          NODE_ARCH="${{ matrix.arch }}"
          mkdir -p portable/bin
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz" -o node.tar.xz
          tar -xJf node.tar.xz
          cp "node-v${NODE_VERSION}-linux-${NODE_ARCH}/bin/node" portable/bin/node
          chmod +x portable/bin/node

      - name: Download Node.js binary (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          NODE_VERSION="24.14.1"
          mkdir -p portable/bin
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" -o node.tar.gz
          tar -xzf node.tar.gz
          cp "node-v${NODE_VERSION}-darwin-arm64/bin/node" portable/bin/node
          chmod +x portable/bin/node

      - name: Download cloudflared (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -o portable/bin/cloudflared.exe

      - name: Download cloudflared (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            CLOUDFLARED_ARCH="arm64"
          else
            CLOUDFLARED_ARCH="amd64"
          fi
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-${CLOUDFLARED_ARCH}" -o portable/bin/cloudflared
          chmod +x portable/bin/cloudflared

      - name: Download cloudflared (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz" -o cloudflared.tgz
          tar -xzf cloudflared.tgz
          mv cloudflared portable/bin/cloudflared
          chmod +x portable/bin/cloudflared

      - name: Build Windows launcher (.exe)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          node scripts/portable/png2ico.cjs \
            portable/dist/logo_16.png \
            portable/dist/logo_32.png \
            portable/dist/logo_256.png \
            scripts/portable/icon.ico
          cd scripts/portable
          GCC_DIR="$(dirname "$(which gcc)")"
          "$GCC_DIR/windres" launcher.rc -O coff -o launcher.res
          gcc -municode -O2 -o ../../portable/小酒馆.exe launcher.c launcher.res -lshell32
          rm -f launcher.res icon.ico

      - name: Create macOS app bundle
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP="portable/小酒馆.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          ICONSET="$(mktemp -d)/AppIcon.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 128 256 512; do
            sips -z $size $size portable/dist/logo_512.png --out "$ICONSET/icon_${size}x${size}.png" >/dev/null 2>&1
          done
          for size in 32 64 256 512; do
            half=$((size / 2))
            sips -z $size $size portable/dist/logo_512.png --out "$ICONSET/icon_${half}x${half}@2x.png" >/dev/null 2>&1
          done
          cp "$ICONSET/icon_512x512.png" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>小酒馆</string>
              <key>CFBundleName</key>
              <string>小酒馆</string>
              <key>CFBundleIdentifier</key>
              <string>com.xiaoxianguan</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          PLIST
          cat > "$APP/Contents/MacOS/小酒馆" << 'LAUNCHER'
          #!/bin/bash
          PORTABLE_DIR="$(cd "$(dirname "$0")/../../.." && pwd)"
          cd "$PORTABLE_DIR"
          PORT="${PORT:-6001}"
          if [ ! -f "bin/node" ]; then
              osascript -e 'display dialog "小酒馆.app must remain inside the 小酒馆 portable folder." buttons {"OK"} default button 1 with icon stop'
              exit 1
          fi
          (sleep 2 && open "http://localhost:$PORT") &
          osascript << ENDSCRIPT
          tell application "Terminal"
              activate
              do script "cd '$PORTABLE_DIR' && PORT=$PORT exec ./bin/node server/node/server.cjs"
          end tell
          ENDSCRIPT
          LAUNCHER
          chmod +x "$APP/Contents/MacOS/小酒馆"

      - name: Add update script (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          printf '@echo off\r\n"%%~dp0bin\\node.exe" "%%~dp0scripts\\updater.cjs"\r\nif errorlevel 1 goto :fail\r\nif exist "%%~dp0.update-tmp" (\r\nif exist "%%~dp0.update-tmp\\new-bin\\" (\r\nxcopy /E /I /Y "%%~dp0.update-tmp\\new-bin\\*" "%%~dp0bin\\" >nul\r\nif errorlevel 1 goto :fail\r\n) else (\r\nif not exist "%%~dp0.update-tmp\\skip-bin-update" goto :fail\r\n)\r\nif not exist "%%~dp0.update-tmp\\latest-version" goto :fail\r\ncopy /Y "%%~dp0.update-tmp\\latest-version" "%%~dp0.installed-version" >nul\r\nif errorlevel 1 goto :fail\r\nrmdir /s /q "%%~dp0.update-tmp" 2>nul\r\n)\r\necho Update complete.\r\npause\r\nexit /b 0\r\n:fail\r\necho Update finalization failed. Existing installation was left in place where possible.\r\npause\r\nexit /b 1\r\n' > portable/update.bat

      - name: Add launcher scripts (Unix)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          cat > portable/start.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          PORT="${PORT:-6001}"
          if command -v xdg-open >/dev/null 2>&1; then
              xdg-open "http://localhost:$PORT" 2>/dev/null &
          elif command -v open >/dev/null 2>&1; then
              open "http://localhost:$PORT" 2>/dev/null &
          fi
          bin/node server/node/server.cjs
          EOF
          cat > portable/update.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$SCRIPT_DIR"
          bin/node scripts/updater.cjs
          rm -rf .update-tmp 2>/dev/null
          EOF
          chmod +x portable/start.sh portable/update.sh

      - name: Add updater script and portable marker
        shell: bash
        run: |
          mkdir -p portable/scripts
          cp scripts/updater.cjs portable/scripts/updater.cjs 2>/dev/null || true
          touch portable/.portable

      - name: Package portable (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="小酒馆-v${VERSION}-win-x64"
          LEGACY_NAME="RisuAI-NodeOnly-v${VERSION}-win-x64"
          cd portable
          7z a -tzip "../${NAME}.zip" .
          # Dual asset: legacy filename for v1.5.x in-app self-update.
          # v1.5.x server.cjs has the old "RisuAI-NodeOnly-" prefix hardcoded;
          # this copy lets that code path keep working through the transition.
          cp "../${NAME}.zip" "../${LEGACY_NAME}.zip"

      - name: Package portable (Unix)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="小酒馆-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          LEGACY_NAME="RisuAI-NodeOnly-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          mv portable "$NAME"
          tar -czf "${NAME}.tar.gz" "$NAME"
          rm -rf "$NAME"
          # Dual asset: legacy filename for v1.5.x in-app self-update.
          # v1.5.x server.cjs has the old "RisuAI-NodeOnly-" prefix hardcoded;
          # this copy lets that code path keep working through the transition.
          cp "${NAME}.tar.gz" "${LEGACY_NAME}.tar.gz"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: portable-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            小酒馆-*
            RisuAI-NodeOnly-*
          retention-days: 1

  release:
    needs: portable
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all portable artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: portable-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            小酒馆-*
            RisuAI-NodeOnly-*
